<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365" />
      <stop offset="100%" stop-color="#fda085" />
    </linearGradient>

    <!-- Moving horizontal gradient wipe for the spotlight effect -->
    <linearGradient id="sweepGradient" x1="-100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
      <!-- Animate the gradient natively across the shapes to simulate a passing light -->
      <animate attributeName="x1" values="-100%; 200%" begin="1.2s" dur="0.8s" fill="freeze" />
      <animate attributeName="x2" values="0%; 300%" begin="1.2s" dur="0.8s" fill="freeze" />
    </linearGradient>

    <mask id="sweepMask">
      <rect x="-500" y="-500" width="1000" height="1000" fill="url(#sweepGradient)" />
    </mask>

  </defs>

  <!-- The solid base logo that appears immediately -->
  <g transform="translate(250, 165) scale(1.55)" fill="url(#layerGrad)" stroke="#181514" stroke-width="3.8" stroke-linejoin="round">
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.2s" dur="0.6s" fill="freeze" />
      <polygon points="0,180 120,120 0,60 -120,120" />
      <polygon points="0,140 120,80 0,20 -120,80" />
      <polygon points="0,100 120,40 0,-20 -120,40" />

      <g stroke="#ffffff" stroke-width="2.5">
        <path d="M -16,-45 L -16,-62 Q -16,-74 0,-74 Q 16,-74 16,-62 L 16,-45 Z" fill="#FF8D9E" />
        <polygon points="-16,-45 16,-45 16,-20 -16,-20" fill="#94A3B8" />
        <line x1="-16" y1="-32.5" x2="16" y2="-32.5" />
        <polygon points="-16,-20 0,-20 0,140 -16,140" fill="#FBBF24" />
        <polygon points="0,-20 16,-20 16,140 0,140" fill="#F59E0B" />
        <polygon points="-16,140 0,140 0,190" fill="#FDE68A" />
        <polygon points="0,140 16,140 0,190" fill="#FCD34D" />
        <polygon points="-6.4,170 6.4,170 0,190" fill="#181514" />
      </g>
    </g>
  </g>

  <!-- The pure white version masked by the sweep gradient, adding a glare pass over the logo -->
  <g transform="translate(250, 165) scale(1.55)" fill="#ffffff" stroke="#ffffff" stroke-width="3.8" stroke-linejoin="round" mask="url(#sweepMask)">
    <polygon points="0,180 120,120 0,60 -120,120" />
    <polygon points="0,140 120,80 0,20 -120,80" />
    <polygon points="0,100 120,40 0,-20 -120,40" />
    <g stroke-width="2.5">    
      <path d="M -16,-45 L -16,-62 Q -16,-74 0,-74 Q 16,-74 16,-62 L 16,-45 Z" />
      <polygon points="-16,-45 16,-45 16,-20 -16,-20" />
      <line x1="-16" y1="-32.5" x2="16" y2="-32.5" />
      <polygon points="-16,-20 0,-20 0,140 -16,140" />
      <polygon points="0,-20 16,-20 16,140 0,140" />
      <polygon points="-16,140 0,140 0,190" />
      <polygon points="0,140 16,140 0,190" />
      <polygon points="-6.4,170 6.4,170 0,190" />
    </g>
  </g>

</svg>
