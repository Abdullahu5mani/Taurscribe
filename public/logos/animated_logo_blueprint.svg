<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365" />
      <stop offset="100%" stop-color="#fda085" />
    </linearGradient>
  </defs>

  <g transform="translate(250, 165) scale(1.55)" stroke-width="3.8" stroke-linejoin="round">
    
    <!-- Bottom Layer -->
    <g opacity="0.3">
      <polygon points="0,180 120,120 0,60 -120,120" fill="url(#layerGrad)" fill-opacity="0" stroke="#f6d365" stroke-dasharray="600" stroke-dashoffset="600">
         <animate attributeName="stroke-dashoffset" values="600;0" dur="0.8s" fill="freeze" />
         <animate attributeName="fill-opacity" values="0;1" begin="0.8s" dur="0.3s" fill="freeze" />
         <animate attributeName="stroke" values="#f6d365;#181514" begin="0.8s" dur="0.3s" fill="freeze" />
      </polygon>
    </g>
    
    <!-- Middle Layer -->
    <g opacity="0.6">
      <polygon points="0,140 120,80 0,20 -120,80" fill="url(#layerGrad)" fill-opacity="0" stroke="#fda085" stroke-dasharray="500" stroke-dashoffset="500">
         <animate attributeName="stroke-dashoffset" values="500;0" begin="0.3s" dur="0.8s" fill="freeze" />
         <animate attributeName="fill-opacity" values="0;1" begin="1.1s" dur="0.3s" fill="freeze" />
         <animate attributeName="stroke" values="#fda085;#181514" begin="1.1s" dur="0.3s" fill="freeze" />
      </polygon>
    </g>
    
    <!-- Top Layer -->
    <g>
      <polygon points="0,100 120,40 0,-20 -120,40" fill="url(#layerGrad)" fill-opacity="0" stroke="#ffffff" stroke-dasharray="500" stroke-dashoffset="500">
         <animate attributeName="stroke-dashoffset" values="500;0" begin="0.6s" dur="0.8s" fill="freeze" />
         <animate attributeName="fill-opacity" values="0;1" begin="1.4s" dur="0.3s" fill="freeze" />
         <animate attributeName="stroke" values="#ffffff;#181514" begin="1.4s" dur="0.3s" fill="freeze" />
      </polygon>
    </g>

    <!-- Stylized Classic Pencil Slicing Through -->
    <g stroke="#ffffff" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.7s" dur="0.1s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate"
        values="0,-400; 0,10; 0,-5; 0,0"
        begin="1.7s" dur="0.5s"
        calcMode="spline" keySplines="0.8 0 1 1; 0 0 0.5 1; 0.5 0 1 1" keyTimes="0; 0.6; 0.8; 1" fill="freeze" />
        
      <path d="M -16,-45 L -16,-62 Q -16,-74 0,-74 Q 16,-74 16,-62 L 16,-45 Z" fill="#FF8D9E" />
      <polygon points="-16,-45 16,-45 16,-20 -16,-20" fill="#94A3B8" />
      <line x1="-16" y1="-32.5" x2="16" y2="-32.5" />
      <polygon points="-16,-20 0,-20 0,140 -16,140" fill="#FBBF24" />
      <polygon points="0,-20 16,-20 16,140 0,140" fill="#F59E0B" />
      <polygon points="-16,140 0,140 0,190" fill="#FDE68A" />
      <polygon points="0,140 16,140 0,190" fill="#FCD34D" />
      <polygon points="-6.4,170 6.4,170 0,190" fill="#181514" />
    </g>

  </g>
</svg>

