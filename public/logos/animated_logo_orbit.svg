<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365" />
      <stop offset="100%" stop-color="#fda085" />
    </linearGradient>
  </defs>

  <g transform="translate(250, 165) scale(1.55)" fill="url(#layerGrad)" stroke="#181514" stroke-width="3.8" stroke-linejoin="round">
    
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.2s" dur="0.6s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" values="0,40; 0,0" begin="0.2s" dur="0.6s" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1" fill="freeze" />
      <polygon points="0,180 120,120 0,60 -120,120" opacity="0.3" />
    </g>
    
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.4s" dur="0.6s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" values="0,40; 0,0" begin="0.4s" dur="0.6s" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1" fill="freeze" />
      <polygon points="0,140 120,80 0,20 -120,80" opacity="0.6" />
    </g>
    
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.6s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" values="0,40; 0,0" begin="0.6s" dur="0.6s" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1" fill="freeze" />
      <polygon points="0,100 120,40 0,-20 -120,40" />
    </g>

    <g stroke="#ffffff" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.8s" dur="0.1s" fill="freeze" />
      
      <!-- Pencil orbits in an ellipse path simulating sweeping around the 3D space -->
      <animateTransform attributeName="transform" type="translate"
        values="-150,-100; 0,-150; 150,-100; 0,-50; 0,0"
        begin="0.8s" dur="1.2s"
        calcMode="spline" keySplines="0.2 0.8 0.2 1; 0.2 0.8 0.2 1; 0.2 0.8 0.2 1; 0.2 0.8 0.2 1" keyTimes="0; 0.3; 0.6; 0.9; 1" fill="freeze" />
      
      <!-- Counter-rotation to make it feel like it's pointing dynamically along the orbit -->
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="45 0 190; 0 0 190; -45 0 190; 15 0 190; 0 0 190"
          begin="0.8s" dur="1.2s"
          calcMode="spline" keySplines="0.2 0.8 0.2 1; 0.2 0.8 0.2 1; 0.2 0.8 0.2 1; 0.2 0.8 0.2 1" keyTimes="0; 0.3; 0.6; 0.9; 1" fill="freeze" />
          
        <path d="M -16,-45 L -16,-62 Q -16,-74 0,-74 Q 16,-74 16,-62 L 16,-45 Z" fill="#FF8D9E" />
        <polygon points="-16,-45 16,-45 16,-20 -16,-20" fill="#94A3B8" />
        <line x1="-16" y1="-32.5" x2="16" y2="-32.5" />
        <polygon points="-16,-20 0,-20 0,140 -16,140" fill="#FBBF24" />
        <polygon points="0,-20 16,-20 16,140 0,140" fill="#F59E0B" />
        <polygon points="-16,140 0,140 0,190" fill="#FDE68A" />
        <polygon points="0,140 16,140 0,190" fill="#FCD34D" />
        <polygon points="-6.4,170 6.4,170 0,190" fill="#181514" />
      </g>
    </g>
  </g>
</svg>
