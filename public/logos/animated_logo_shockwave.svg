<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365" />
      <stop offset="100%" stop-color="#fda085" />
    </linearGradient>
  </defs>

  <g transform="translate(250, 165) scale(1.55)" fill="url(#layerGrad)" stroke="#181514" stroke-width="3.8" stroke-linejoin="round">
    
    <!-- Layers pulse down upon impact -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.2s" dur="0.5s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" values="0,40; 0,0" begin="0.2s" dur="0.5s" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1" fill="freeze" />
      
      <!-- Impact shockwave layer bounce -->
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,10; 0,0" begin="1.45s" dur="0.3s" calcMode="spline" keySplines="0.4 0 0.8 1; 0.2 0.8 0.2 1" keyTimes="0;0.5;1" additive="sum" />
      <polygon points="0,180 120,120 0,60 -120,120" opacity="0.3" />
    </g>
    
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.4s" dur="0.5s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" values="0,40; 0,0" begin="0.4s" dur="0.5s" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1" fill="freeze" />
      
      <!-- Impact shockwave layer bounce -->
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,15; 0,0" begin="1.35s" dur="0.3s" calcMode="spline" keySplines="0.4 0 0.8 1; 0.2 0.8 0.2 1" keyTimes="0;0.5;1" additive="sum" />
      <polygon points="0,140 120,80 0,20 -120,80" opacity="0.6" />
    </g>
    
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" begin="0.6s" dur="0.5s" fill="freeze" />
      <animateTransform attributeName="transform" type="translate" values="0,40; 0,0" begin="0.6s" dur="0.5s" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0;1" fill="freeze" />
      <!-- Impact shockwave layer bounce -->
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,20; 0,0" begin="1.25s" dur="0.3s" calcMode="spline" keySplines="0.4 0 0.8 1; 0.2 0.8 0.2 1" keyTimes="0;0.5;1" additive="sum" />
      <polygon points="0,100 120,40 0,-20 -120,40" />
    </g>

    <!-- Shockwave Ring Effect (Expands when pencil hits) -->
    <ellipse cx="0" cy="50" rx="0" ry="0" fill="none" stroke="url(#layerGrad)" stroke-width="4" opacity="0" transform="scale(1, 0.5)">
      <animate attributeName="opacity" values="0; 1; 0" begin="1.25s" dur="0.6s" fill="freeze" />
      <animate attributeName="rx" values="0; 300" begin="1.25s" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0; 1" />
      <animate attributeName="ry" values="0; 300" begin="1.25s" dur="0.8s" fill="freeze" calcMode="spline" keySplines="0.2 0.8 0.2 1" keyTimes="0; 1" />
      <animate attributeName="stroke-width" values="10; 0" begin="1.25s" dur="0.8s" fill="freeze" />
    </ellipse>

    <!-- Stylized Classic Pencil Slicing Through -->
    <g stroke="#ffffff" stroke-width="2.5" opacity="0">
      <animate attributeName="opacity" values="0;1" begin="1.0s" dur="0.1s" fill="freeze" />
      
      <!-- Rapid plunge and deep squish bounce -->
      <animateTransform attributeName="transform" type="translate"
        values="0,-400; 0,30; 0,-15; 0,0"
        begin="1.0s" dur="0.6s"
        calcMode="spline" keySplines="0.8 0 1 1; 0 0 0.5 1; 0.5 0 1 1" keyTimes="0; 0.4; 0.6; 1" fill="freeze" />
        
      <!-- Eraser -->
      <path d="M -16,-45 L -16,-62 Q -16,-74 0,-74 Q 16,-74 16,-62 L 16,-45 Z" fill="#FF8D9E" />
      <!-- Ferrule (metal part) -->
      <polygon points="-16,-45 16,-45 16,-20 -16,-20" fill="#94A3B8" />
      <!-- Ferrule Detail Line -->
      <line x1="-16" y1="-32.5" x2="16" y2="-32.5" />
      <!-- Shaft Left (Light Yellow) -->
      <polygon points="-16,-20 0,-20 0,140 -16,140" fill="#FBBF24" />
      <!-- Shaft Right (Darker Yellow) -->
      <polygon points="0,-20 16,-20 16,140 0,140" fill="#F59E0B" />
      <!-- Wood Cone Left -->
      <polygon points="-16,140 0,140 0,190" fill="#FDE68A" />
      <!-- Wood Cone Right -->
      <polygon points="0,140 16,140 0,190" fill="#FCD34D" />
      <!-- Lead Tip -->
      <polygon points="-6.4,170 6.4,170 0,190" fill="#181514" />
    </g>

  </g>
</svg>

